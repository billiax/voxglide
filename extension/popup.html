<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: system-ui, sans-serif; padding: 16px; background: #fff; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #1a1a2e; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; font-family: 'SF Mono', Menlo, Consolas, monospace; margin-bottom: 10px;
    }
    input[type="text"]:focus { outline: none; border-color: #2563eb; }
    textarea {
      width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; font-family: 'SF Mono', Menlo, Consolas, monospace;
      resize: vertical; min-height: 60px; line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: #2563eb; }

    .options { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
    .option-label {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: #444; cursor: pointer; user-select: none;
    }
    .option-label input[type="checkbox"] {
      accent-color: #2563eb; width: 14px; height: 14px; cursor: pointer;
    }

    .preview {
      background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px;
      padding: 8px 10px; margin: 10px 0; font-size: 11px;
      font-family: 'SF Mono', Menlo, Consolas, monospace; color: #555;
      line-height: 1.6; word-break: break-all; max-height: 140px; overflow-y: auto;
      white-space: pre-wrap;
    }
    .preview-title { font-size: 11px; color: #999; margin-bottom: 2px; font-family: system-ui, sans-serif; }
    .preview .key { color: #2563eb; }
    .preview .url { color: #059669; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
    .toggle-row span { font-size: 13px; color: #333; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #ccc; border-radius: 22px;
      cursor: pointer; transition: 0.2s;
    }
    .slider:before {
      content: ''; position: absolute; height: 16px; width: 16px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #2563eb; }
    .toggle input:checked + .slider:before { transform: translateX(18px); }

    button {
      width: 100%; padding: 8px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    #inject { background: #2563eb; color: #fff; }
    #inject:hover { background: #1d4ed8; }
    #status { font-size: 11px; color: #999; text-align: center; margin-top: 6px; }
    .empty-hint { color: #bbb; font-style: italic; }
    .footer { margin-top: 10px; text-align: center; }
    .footer a {
      font-size: 11px; color: #2563eb; text-decoration: none; cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }
    .footer a.disabled { color: #ccc; pointer-events: none; }
  </style>
</head>
<body>
  <h1>VoxGlide</h1>

  <div>
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="https://your-server.ngrok-free.dev" />
  </div>

  <div>
    <label>Options</label>
    <div class="options">
      <label class="option-label"><input type="checkbox" id="optAutoContext" checked /> Auto Context</label>
      <label class="option-label"><input type="checkbox" id="optTts" checked /> TTS</label>
      <label class="option-label"><input type="checkbox" id="optDebug" /> Debug</label>
    </div>
  </div>

  <div>
    <label>Context (optional)</label>
    <textarea id="context" placeholder="Describe what this page is or what the assistant should help with"></textarea>
  </div>

  <div>
    <div class="preview-title">Preview</div>
    <div class="preview" id="preview"><span class="empty-hint">Enter a server URL to see preview</span></div>
  </div>

  <div class="toggle-row">
    <span>Auto-inject on every page</span>
    <label class="toggle"><input type="checkbox" id="autoInject" /><span class="slider"></span></label>
  </div>

  <button id="inject">Inject Now</button>
  <div id="status"></div>
  <div class="footer"><a id="adminLink" class="disabled">Open Admin Panel</a></div>

  <script src="popup.js"></script>
</body>
</html>
