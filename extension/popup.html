<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: system-ui, sans-serif; padding: 16px; background: #fff; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: 'SF Mono', Menlo, Consolas, monospace; margin-bottom: 10px; }
    input[type="text"]:focus { outline: none; border-color: #2563eb; }
    textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; font-family: 'SF Mono', Menlo, Consolas, monospace; resize: vertical; min-height: 120px; line-height: 1.5; }
    textarea:focus { outline: none; border-color: #2563eb; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
    .toggle-row span { font-size: 13px; color: #333; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; cursor: pointer; transition: 0.2s; }
    .slider:before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .slider { background: #2563eb; }
    .toggle input:checked + .slider:before { transform: translateX(18px); }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    #inject { background: #2563eb; color: #fff; }
    #inject:hover { background: #1d4ed8; }
    #status { font-size: 11px; color: #999; text-align: center; margin-top: 6px; }
    .help { font-size: 10px; color: #aaa; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Code Injector</h1>
  <div>
    <label>Script URL (fetched by extension, bypasses CSP/mixed content)</label>
    <input type="text" id="scriptUrl" placeholder="http://192.168.50.10:3101/voice-sdk.iife.js" />
  </div>
  <div>
    <label>Code to run after script loads</label>
    <textarea id="code" placeholder="// Your code here"></textarea>
  </div>
  <div class="toggle-row">
    <span>Auto-inject on every page</span>
    <label class="toggle"><input type="checkbox" id="autoInject" /><span class="slider"></span></label>
  </div>
  <button id="inject">Inject now</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
