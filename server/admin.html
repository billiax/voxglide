<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxGlide Admin Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e6edf3;
  }
  .header h1 span { color: #58a6ff; }
  .connection-status {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f85149;
  }
  .status-dot.connected { background: #3fb950; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: #161b22;
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid #30363d;
    font-size: 12px;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .session-list {
    flex: 1;
    overflow-y: auto;
  }
  .session-item {
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.15s;
  }
  .session-item:hover { background: #1c2128; }
  .session-item.active { background: #1f2937; border-left: 3px solid #58a6ff; }
  .session-item.disconnected { opacity: 0.5; }
  .session-id {
    font-size: 12px;
    font-family: monospace;
    color: #58a6ff;
    margin-bottom: 4px;
  }
  .session-meta {
    font-size: 11px;
    color: #8b949e;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .session-meta .url {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .session-badge.live { background: #1b4332; color: #3fb950; }
  .session-badge.dead { background: #3d1f1f; color: #f85149; }

  .no-sessions {
    padding: 40px 16px;
    text-align: center;
    color: #484f58;
    font-size: 13px;
  }

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .main-header {
    padding: 12px 20px;
    border-bottom: 1px solid #30363d;
    background: #161b22;
    font-size: 13px;
    color: #8b949e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .main-header .session-info { color: #e6edf3; }

  .event-stream {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #484f58;
    font-size: 14px;
  }

  /* ── Event items ── */
  .event-item {
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.5;
    border-left: 3px solid transparent;
  }
  .event-time {
    font-size: 11px;
    color: #484f58;
    font-family: monospace;
    margin-right: 8px;
  }
  .event-label {
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    margin-right: 8px;
    display: inline-block;
  }

  /* Event type colors */
  .event-item.text {
    border-left-color: #58a6ff;
    background: #0d1f3c;
  }
  .event-item.text .event-label { background: #1a3a5c; color: #58a6ff; }

  .event-item.response {
    border-left-color: #3fb950;
    background: #0d2818;
  }
  .event-item.response .event-label { background: #1b4332; color: #3fb950; }

  .event-item.toolCall {
    border-left-color: #d2a8ff;
    background: #1a0d2e;
  }
  .event-item.toolCall .event-label { background: #2d1b4e; color: #d2a8ff; }

  .event-item.toolResult {
    border-left-color: #a371f7;
    background: #170d2e;
  }
  .event-item.toolResult .event-label { background: #271b4e; color: #a371f7; }

  .event-item.scan {
    border-left-color: #79c0ff;
    background: #0d1929;
  }
  .event-item.scan .event-label { background: #163040; color: #79c0ff; }

  .event-item.context\.update {
    border-left-color: #ffa657;
    background: #2a1a0a;
  }
  .event-item.context\.update .event-label { background: #3d2a14; color: #ffa657; }

  .event-item.session\.start, .event-item.session\.stop {
    border-left-color: #8b949e;
    background: #161b22;
  }
  .event-item.session\.start .event-label,
  .event-item.session\.stop .event-label { background: #21262d; color: #8b949e; }

  .event-item.error {
    border-left-color: #f85149;
    background: #2d1215;
  }
  .event-item.error .event-label { background: #3d1f1f; color: #f85149; }

  .event-item.response\.delta {
    border-left-color: #56d364;
    background: #0d2818;
  }
  .event-item.response\.delta .event-label { background: #1b4332; color: #56d364; }

  .event-item.history\.summarized {
    border-left-color: #ffa657;
    background: #2a1a0a;
  }
  .event-item.history\.summarized .event-label { background: #3d2a14; color: #ffa657; }

  .event-item.tool\.progress {
    border-left-color: #bc8cff;
    background: #1a0d2e;
  }
  .event-item.tool\.progress .event-label { background: #2d1b4e; color: #bc8cff; }

  .event-item.session\.resumed {
    border-left-color: #58a6ff;
    background: #0d1f3c;
  }
  .event-item.session\.resumed .event-label { background: #1a3a5c; color: #58a6ff; }

  .event-item.session\.disconnected {
    border-left-color: #8b949e;
    background: #161b22;
  }
  .event-item.session\.disconnected .event-label { background: #21262d; color: #8b949e; }

  .tool-progress-status {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 6px;
  }
  .tool-progress-status.executing { background: #1a3a5c; color: #58a6ff; }
  .tool-progress-status.completed { background: #1b4332; color: #3fb950; }
  .tool-progress-status.failed { background: #3d1f1f; color: #f85149; }

  .event-content {
    margin-top: 4px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .event-content.collapsed {
    max-height: 80px;
    overflow: hidden;
    position: relative;
  }
  .event-content.collapsed::after {
    content: '... (click to expand)';
    position: absolute;
    bottom: 0;
    right: 0;
    background: inherit;
    padding-left: 16px;
    color: #58a6ff;
    cursor: pointer;
    font-size: 11px;
  }

  /* Scan details */
  .scan-details {
    margin-top: 6px;
    font-size: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 4px;
  }
  .scan-stat {
    background: #21262d;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .scan-stat strong { color: #e6edf3; }

  /* Tool call formatting */
  .tool-name {
    color: #d2a8ff;
    font-weight: 600;
  }
  .tool-args {
    font-family: monospace;
    font-size: 12px;
    color: #8b949e;
    margin-top: 2px;
  }

  /* Context panel */
  .context-panel {
    margin-top: 8px;
  }
  .context-section {
    margin-top: 4px;
    border: 1px solid #30363d;
    border-radius: 6px;
    overflow: hidden;
  }
  .context-section summary {
    padding: 6px 10px;
    background: #161b22;
    color: #58a6ff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
  }
  .context-section summary:hover { background: #1c2128; }
  .context-content {
    padding: 10px 12px;
    margin: 0;
    font-size: 12px;
    font-family: monospace;
    line-height: 1.6;
    color: #c9d1d9;
    background: #0d1117;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<div class="header">
  <h1><span>VoxGlide</span> Admin Dashboard</h1>
  <div class="connection-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">Sessions <span id="sessionCount">(0)</span></div>
    <div class="session-list" id="sessionList">
      <div class="no-sessions" id="noSessions">No active sessions</div>
    </div>
  </div>

  <div class="main">
    <div class="main-header" id="mainHeader">
      <span class="session-info" id="selectedSessionInfo">Select a session to view events</span>
      <span id="selectedSessionMeta"></span>
    </div>
    <div class="event-stream" id="eventStream">
      <div class="empty-state" id="emptyState">Select a session from the sidebar</div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── State ──
  const sessions = new Map(); // sessionId -> { meta, events[] }
  let selectedSessionId = null;
  let ws = null;
  let autoScroll = true;

  // ── DOM refs ──
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const sessionList = document.getElementById('sessionList');
  const noSessions = document.getElementById('noSessions');
  const sessionCount = document.getElementById('sessionCount');
  const eventStream = document.getElementById('eventStream');
  const emptyState = document.getElementById('emptyState');
  const selectedSessionInfo = document.getElementById('selectedSessionInfo');
  const selectedSessionMeta = document.getElementById('selectedSessionMeta');

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/admin');

    ws.onopen = () => {
      statusDot.classList.add('connected');
      statusText.textContent = 'Connected';
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Disconnected - reconnecting...';
      setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'Error';
    };

    ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      handleMessage(msg);
    };
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'sessions.list':
        for (const s of msg.sessions) {
          if (!sessions.has(s.id)) {
            sessions.set(s.id, { meta: s, events: [] });
          } else {
            sessions.get(s.id).meta = s;
          }
        }
        renderSidebar();
        break;

      case 'session.new':
        sessions.set(msg.session.id, { meta: msg.session, events: [] });
        renderSidebar();
        // Auto-select if no session selected
        if (!selectedSessionId) {
          selectSession(msg.session.id);
        }
        break;

      case 'session.update':
        if (sessions.has(msg.session.id)) {
          sessions.get(msg.session.id).meta = msg.session;
          renderSidebar();
          if (selectedSessionId === msg.session.id) {
            renderSessionHeader();
          }
        }
        break;

      case 'session.event':
        if (!sessions.has(msg.sessionId)) {
          sessions.set(msg.sessionId, { meta: { id: msg.sessionId, pageUrl: '', connectedAt: Date.now(), messageCount: 0, disconnected: false }, events: [] });
          renderSidebar();
        }
        const session = sessions.get(msg.sessionId);
        session.events.push(msg.event);
        // Update message count
        if (msg.event.type === 'text') {
          session.meta.messageCount = (session.meta.messageCount || 0) + 1;
          renderSidebar();
        }
        if (selectedSessionId === msg.sessionId) {
          appendEvent(msg.event);
        }
        break;

      case 'session.disconnected':
        if (sessions.has(msg.sessionId)) {
          sessions.get(msg.sessionId).meta.disconnected = true;
          renderSidebar();
          if (selectedSessionId === msg.sessionId) {
            renderSessionHeader();
          }
        }
        break;
    }
  }

  // ── Rendering ──
  function renderSidebar() {
    const ids = Array.from(sessions.keys());
    sessionCount.textContent = '(' + ids.length + ')';

    if (ids.length === 0) {
      noSessions.style.display = 'block';
      return;
    }
    noSessions.style.display = 'none';

    // Sort: active first, then by connection time desc
    ids.sort((a, b) => {
      const sa = sessions.get(a).meta;
      const sb = sessions.get(b).meta;
      if (sa.disconnected !== sb.disconnected) return sa.disconnected ? 1 : -1;
      return sb.connectedAt - sa.connectedAt;
    });

    // Rebuild list preserving selection
    const fragment = document.createDocumentFragment();
    for (const id of ids) {
      const s = sessions.get(id).meta;
      const div = document.createElement('div');
      div.className = 'session-item' +
        (id === selectedSessionId ? ' active' : '') +
        (s.disconnected ? ' disconnected' : '');
      div.onclick = () => selectSession(id);

      const shortId = id.substring(0, 8);
      const badge = s.disconnected
        ? '<span class="session-badge dead">disconnected</span>'
        : '<span class="session-badge live">live</span>';
      const elapsed = formatElapsed(s.connectedAt);

      div.innerHTML =
        '<div class="session-id">' + shortId + '...' + badge + '</div>' +
        '<div class="session-meta">' +
          '<div class="url">' + escapeHtml(s.pageUrl || 'unknown') + '</div>' +
          '<div>' + elapsed + ' | ' + (s.messageCount || 0) + ' messages</div>' +
        '</div>';
      fragment.appendChild(div);
    }

    // Replace children
    while (sessionList.firstChild && sessionList.firstChild !== noSessions) {
      sessionList.removeChild(sessionList.firstChild);
    }
    sessionList.insertBefore(fragment, noSessions);
  }

  function selectSession(id) {
    selectedSessionId = id;
    renderSidebar();
    renderSessionHeader();
    renderEvents();
  }

  function renderSessionHeader() {
    if (!selectedSessionId || !sessions.has(selectedSessionId)) {
      selectedSessionInfo.textContent = 'Select a session to view events';
      selectedSessionMeta.textContent = '';
      return;
    }
    const s = sessions.get(selectedSessionId).meta;
    const status = s.disconnected ? ' (disconnected)' : ' (live)';
    selectedSessionInfo.textContent = s.id.substring(0, 8) + '...' + status;
    selectedSessionMeta.textContent = escapeHtml(s.pageUrl || '');
  }

  function renderEvents() {
    eventStream.innerHTML = '';
    if (!selectedSessionId || !sessions.has(selectedSessionId)) {
      eventStream.innerHTML = '<div class="empty-state">Select a session from the sidebar</div>';
      return;
    }
    const events = sessions.get(selectedSessionId).events;
    if (events.length === 0) {
      eventStream.innerHTML = '<div class="empty-state">No events yet</div>';
      return;
    }
    for (const ev of events) {
      appendEvent(ev, false);
    }
    scrollToBottom();
  }

  function appendEvent(event, scroll = true) {
    // Remove empty state
    const empty = eventStream.querySelector('.empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    const cssClass = event.type.replace('.', '\\.');
    div.className = 'event-item ' + event.type;

    const time = formatTime(event.timestamp);
    const label = eventLabel(event.type);
    let content = '';

    switch (event.type) {
      case 'text':
        content = '<strong>User:</strong> ' + escapeHtml(event.data.text || '');
        break;
      case 'response':
        content = '<strong>AI:</strong> ' + escapeHtml(event.data.text || '');
        break;
      case 'toolCall':
        if (event.data.functionCalls) {
          content = event.data.functionCalls.map(fc =>
            '<span class="tool-name">' + escapeHtml(fc.name) + '</span>' +
            '<div class="tool-args">' + escapeHtml(JSON.stringify(fc.args, null, 2)) + '</div>'
          ).join('<br>');
        }
        break;
      case 'toolResult':
        if (event.data.responses) {
          content = event.data.responses.map(r =>
            '<span class="tool-name">' + escapeHtml(r.name) + '</span>: ' +
            '<span class="tool-args">' + escapeHtml(typeof r.response === 'string' ? r.response : JSON.stringify(r.response, null, 2)) + '</span>'
          ).join('<br>');
        }
        break;
      case 'scan':
        content = renderScanData(event.data);
        break;
      case 'context.update':
        content = 'Page context updated';
        if (event.data.systemInstruction) {
          content += renderPageContext(event.data.systemInstruction);
        }
        break;
      case 'session.start':
        content = 'Session started';
        if (event.data.pageUrl) content += ' | ' + escapeHtml(event.data.pageUrl);
        if (event.data.toolCount) content += ' | ' + event.data.toolCount + ' tools';
        if (event.data.systemInstruction) {
          content += renderPageContext(event.data.systemInstruction);
        }
        break;
      case 'session.stop':
        content = event.data.reason === 'disconnected' ? 'Client disconnected' : 'Session stopped';
        break;
      case 'tool.progress':
        content = '<span class="tool-name">' + escapeHtml(event.data.toolName || '') + '</span>' +
          '<span class="tool-progress-status ' + (event.data.status || '') + '">' + escapeHtml(event.data.status || '') + '</span>';
        break;
      case 'history.summarized':
        content = 'History summarized: <strong>' + (event.data.oldTurns || 0) + '</strong> old turns compressed, ' +
          '<strong>' + (event.data.keptTurns || 0) + '</strong> recent turns kept. ' +
          'Summary: ' + (event.data.summaryLength || 0) + ' chars';
        break;
      case 'session.resumed':
        content = 'Session resumed (reconnected)';
        if (event.data.pageUrl) content += ' | ' + escapeHtml(event.data.pageUrl);
        break;
      case 'session.disconnected':
        content = 'Client disconnected';
        if (event.data.reason) content += ' (' + escapeHtml(event.data.reason) + ')';
        break;
      case 'error':
        content = escapeHtml(event.data.message || JSON.stringify(event.data));
        break;
      default:
        content = escapeHtml(JSON.stringify(event.data, null, 2));
    }

    div.innerHTML =
      '<div>' +
        '<span class="event-time">' + time + '</span>' +
        '<span class="event-label">' + label + '</span>' +
      '</div>' +
      '<div class="event-content">' + content + '</div>';

    // Click to expand collapsed content
    div.addEventListener('click', () => {
      const c = div.querySelector('.event-content');
      if (c && c.classList.contains('collapsed')) {
        c.classList.remove('collapsed');
      }
    });

    eventStream.appendChild(div);

    if (scroll && autoScroll) {
      scrollToBottom();
    }
  }

  function renderScanData(data) {
    if (!data || typeof data !== 'object') return escapeHtml(JSON.stringify(data));

    let html = '<div class="scan-details">';
    const fields = [
      ['forms', 'Forms'],
      ['inputs', 'Inputs'],
      ['buttons', 'Buttons'],
      ['links', 'Links'],
      ['headings', 'Headings'],
      ['images', 'Images'],
      ['tables', 'Tables'],
      ['interactiveElements', 'Interactive'],
    ];

    for (const [key, label] of fields) {
      if (data[key] !== undefined) {
        const val = Array.isArray(data[key]) ? data[key].length : data[key];
        html += '<div class="scan-stat"><strong>' + val + '</strong> ' + label + '</div>';
      }
    }
    html += '</div>';

    // If there's extra data, show it collapsed
    const knownKeys = new Set(fields.map(f => f[0]));
    const extra = {};
    for (const k of Object.keys(data)) {
      if (!knownKeys.has(k)) extra[k] = data[k];
    }
    if (Object.keys(extra).length > 0) {
      html += '<div class="tool-args" style="margin-top:6px">' + escapeHtml(JSON.stringify(extra, null, 2)) + '</div>';
    }

    return html;
  }

  function renderPageContext(systemInstruction) {
    // Parse sections from the system prompt template
    const sections = {};
    let currentSection = null;
    const lines = systemInstruction.split('\n');

    for (const line of lines) {
      const sectionMatch = line.match(/^([A-Z ]+):$/);
      if (sectionMatch) {
        currentSection = sectionMatch[1];
        sections[currentSection] = [];
      } else if (currentSection) {
        sections[currentSection].push(line);
      }
    }

    let html = '<div class="context-panel">';

    // Show PAGE CONTEXT section with nice formatting
    const pageContext = sections['PAGE CONTEXT'];
    if (pageContext) {
      const contextText = pageContext.join('\n').trim();
      html += '<details class="context-section">' +
        '<summary>Page Analysis</summary>' +
        '<pre class="context-content">' + escapeHtml(contextText) + '</pre>' +
        '</details>';
    }

    // Show ADDITIONAL CONTEXT
    const devContext = sections['ADDITIONAL CONTEXT'];
    if (devContext) {
      const devText = devContext.join('\n').trim();
      if (devText && devText !== 'None.') {
        html += '<details class="context-section">' +
          '<summary>Developer Context</summary>' +
          '<pre class="context-content">' + escapeHtml(devText) + '</pre>' +
          '</details>';
      }
    }

    // Show AVAILABLE ACTIONS
    const actions = sections['AVAILABLE ACTIONS'];
    if (actions) {
      const actionsText = actions.join('\n').trim();
      if (actionsText && actionsText !== 'None.') {
        html += '<details class="context-section">' +
          '<summary>Available Actions</summary>' +
          '<pre class="context-content">' + escapeHtml(actionsText) + '</pre>' +
          '</details>';
      }
    }

    html += '</div>';
    return html;
  }

  // ── Helpers ──
  function eventLabel(type) {
    const labels = {
      'text': 'USER',
      'response': 'AI',
      'toolCall': 'TOOL CALL',
      'toolResult': 'TOOL RESULT',
      'scan': 'SCAN',
      'context.update': 'CONTEXT',
      'session.start': 'START',
      'session.stop': 'STOP',
      'session.resumed': 'RESUMED',
      'session.disconnected': 'DISCONNECTED',
      'tool.progress': 'TOOL STATUS',
      'history.summarized': 'SUMMARIZED',
      'response.delta': 'DELTA',
      'error': 'ERROR',
    };
    return labels[type] || type.toUpperCase();
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatElapsed(connectedAt) {
    const diff = Math.floor((Date.now() - connectedAt) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      eventStream.scrollTop = eventStream.scrollHeight;
    });
  }

  // Detect if user scrolled up (disable auto-scroll)
  eventStream.addEventListener('scroll', () => {
    const atBottom = eventStream.scrollTop + eventStream.clientHeight >= eventStream.scrollHeight - 40;
    autoScroll = atBottom;
  });

  // Update elapsed times every 10s
  setInterval(renderSidebar, 10000);

  // ── Start ──
  connect();
})();
</script>
</body>
</html>
